  <!-- Left switches -->
  <line x1="36" y1="20" x2="36" y2="32" stroke="#231F20" stroke-width="1.5"/>
  <line x1="32" y1="32" x2="40" y2="38" stroke="#231F20" stroke-width="2"/>
  <circle cx="36" cy="40" r="2" fill="#231F20"/>
  <line x1="36" y1="42" x2="36" y2="48" stroke="#231F20" stroke-width="1.5"/>
  <line x1="32" y1="48" x2="40" y2="54" stroke="#231F20" stroke-width="2"/>
  <line x1="36" y1="56" x2="36" y2="60" stroke="#231F20" stroke-width="1.5"/>
  <!-- Right switches -->
  <line x1="84" y1="20" x2="84" y2="32" stroke="#231F20" stroke-width="1.5"/>
  <line x1="80" y1="32" x2="88" y2="38" stroke="#231F20" stroke-width="2"/>
