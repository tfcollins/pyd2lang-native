  <circle cx="60" cy="40" r="10" fill="none" stroke="#231F20" stroke-width="1.5"/>
  <text x="60" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#231F20">M</text>
  <line x1="70" y1="40" x2="84" y2="40" stroke="#231F20" stroke-width="1.5"/>
