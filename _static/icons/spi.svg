<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- SPI signal lines with labels -->
  <line x1="15" y1="30" x2="105" y2="30" stroke="#0067B9" stroke-width="1.5"/>
  <text x="60" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#58595B">SCLK</text>
  <line x1="15" y1="42" x2="105" y2="42" stroke="#0067B9" stroke-width="1.5"/>
  <text x="60" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#58595B">MOSI</text>
  <line x1="15" y1="54" x2="105" y2="54" stroke="#0067B9" stroke-width="1.5"/>
  <text x="60" y="51" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#58595B">MISO</text>
  <line x1="15" y1="66" x2="105" y2="66" stroke="#0067B9" stroke-width="1.5"/>
  <text x="60" y="63" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#58595B">CS</text>
  <!-- Arrows on lines -->
  <polygon points="100,27 105,30 100,33" fill="#0067B9"/>
  <polygon points="100,39 105,42 100,45" fill="#0067B9"/>
  <polygon points="20,51 15,54 20,57" fill="#0067B9"/>
  <polygon points="100,63 105,66 100,69" fill="#0067B9"/>
  <!-- Label -->
  <text x="60" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#231F20">SPI</text>
</svg>
