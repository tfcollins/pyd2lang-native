name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "d2/**"
      - "lib/**"
      - ".github/workflows/docs.yml"
      - "pyproject.toml"
      - "setup.py"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "docs/**"
      - "d2/**"
      - "lib/**"
      - ".github/workflows/docs.yml"
      - "pyproject.toml"
      - "setup.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build native library
        run: bash lib/build.sh

      - name: Install dependencies
        run: python -m pip install -e ".[docs]"

      - name: Build docs
        run: sphinx-build -b html docs docs/_build/html

      - name: Upload docs build
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
          if-no-files-found: error

  publish:
    needs: build
    if: |
      github.event_name == 'push' ||
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main'
      ) ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      pull-requests: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GH_PAGES_BRANCH: gh-pages
      PREVIEW_PATH: dev/pr-${{ github.event.pull_request.number }}
    steps:
      - name: Download docs build
        uses: actions/download-artifact@v4
        with:
          name: docs-html
          path: built-docs

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout Pages content
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads "$url" "${GH_PAGES_BRANCH}" >/dev/null 2>&1; then
            git clone --depth 1 --branch "${GH_PAGES_BRANCH}" "$url" site
          else
            mkdir site
            git -C site init
            git -C site checkout -b "${GH_PAGES_BRANCH}"
            git -C site remote add origin "$url"
          fi

      - name: Stage root docs
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          find site -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            ! -name "dev" \
            -exec rm -rf {} +
          cp -a built-docs/. site/
          touch site/.nojekyll

      - name: Stage PR preview docs
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          rm -rf "site/${PREVIEW_PATH}"
          mkdir -p "site/${PREVIEW_PATH}"
          cp -a built-docs/. "site/${PREVIEW_PATH}/"
          touch site/.nojekyll

      - name: Commit Pages content
        id: commit
        run: |
          set -euo pipefail
          git -C site add -A
          if git -C site diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              message="Publish docs preview for PR #${{ github.event.pull_request.number }}"
            else
              message="Publish docs site"
            fi
            git -C site commit -m "$message"
            git -C site push origin "${GH_PAGES_BRANCH}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-docs-preview -->';
            const previewUrl = `${{ steps.deployment.outputs.page_url }}dev/pr-${{ github.event.pull_request.number }}/`;
            const body = `${marker}\nDocs preview: ${previewUrl}`;
            const {owner, repo} = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  cleanup:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      pull-requests: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GH_PAGES_BRANCH: gh-pages
      PREVIEW_PATH: dev/pr-${{ github.event.pull_request.number }}
    steps:
      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout Pages content
        id: pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads "$url" "${GH_PAGES_BRANCH}" >/dev/null 2>&1; then
            git clone --depth 1 --branch "${GH_PAGES_BRANCH}" "$url" site
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove PR preview docs
        id: cleanup
        if: steps.pages.outputs.found == 'true'
        run: |
          set -euo pipefail
          if [ -d "site/${PREVIEW_PATH}" ]; then
            rm -rf "site/${PREVIEW_PATH}"
            git -C site add -A
            git -C site commit -m "Remove docs preview for PR #${{ github.event.pull_request.number }}"
            git -C site push origin "${GH_PAGES_BRANCH}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Pages artifact
        if: steps.cleanup.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.cleanup.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Mark preview removed
        if: steps.pages.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-docs-preview -->';
            const body = `${marker}\nDocs preview removed after PR close.`;
            const {owner, repo} = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            }
