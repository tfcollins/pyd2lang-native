<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Current path -->
  <line x1="12" y1="30" x2="108" y2="30" stroke="#C8102E" stroke-width="2"/>
  <!-- Shunt resistor -->
  <rect x="45" y="26" width="30" height="8" rx="1" fill="none" stroke="#231F20" stroke-width="1.5"/>
  <text x="60" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#58595B">Rs</text>
  <!-- Sense amplifier triangle -->
  <line x1="50" y1="34" x2="50" y2="44" stroke="#0067B9" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="70" y1="34" x2="70" y2="44" stroke="#0067B9" stroke-width="1" stroke-dasharray="2,2"/>
  <polygon points="46,46 74,46 60,64" fill="none" stroke="#231F20" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="60" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#231F20">A</text>
  <!-- Output -->
  <line x1="60" y1="64" x2="60" y2="72" stroke="#0067B9" stroke-width="1.5"/>
  <text x="68" y="72" font-family="Arial, sans-serif" font-size="8" fill="#58595B">Vout</text>
  <!-- Label -->
  <text x="60" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#231F20">Current Sense</text>
</svg>
