<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <!-- Amplifier triangle -->
  <polygon points="10,12 10,68 90,40" fill="#FFFFFF" stroke="#231F20" stroke-width="2" stroke-linejoin="round"/>
  <!-- Differential inputs -->
  <text x="16" y="34" font-family="Arial, sans-serif" font-size="12" fill="#231F20">+</text>
  <text x="16" y="54" font-family="Arial, sans-serif" font-size="12" fill="#231F20">−</text>
  <!-- RG resistor symbol between inputs -->
  <line x1="26" y1="32" x2="26" y2="36" stroke="#0067B9" stroke-width="1"/>
  <rect x="23" y="36" width="6" height="10" rx="1" fill="none" stroke="#0067B9" stroke-width="1"/>
  <line x1="26" y1="46" x2="26" y2="50" stroke="#0067B9" stroke-width="1"/>
  <text x="34" y="44" font-family="Arial, sans-serif" font-size="7" fill="#0067B9">RG</text>
  <!-- Label -->
  <text x="42" y="44" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#231F20">INA</text>
</svg>
