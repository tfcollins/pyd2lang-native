<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Input power -->
  <line x1="12" y1="40" x2="35" y2="40" stroke="#C8102E" stroke-width="1.5"/>
  <polygon points="32,37 37,40 32,43" fill="#C8102E"/>
  <!-- Charger block -->
  <rect x="36" y="28" width="30" height="24" rx="2" fill="none" stroke="#231F20" stroke-width="1.5"/>
  <text x="51" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#231F20">CHG</text>
  <!-- Charging arrow -->
  <line x1="66" y1="40" x2="78" y2="40" stroke="#0067B9" stroke-width="1.5"/>
  <polygon points="75,37 80,40 75,43" fill="#0067B9"/>
  <!-- Battery symbol -->
  <line x1="82" y1="30" x2="82" y2="50" stroke="#231F20" stroke-width="3"/>
  <line x1="88" y1="34" x2="88" y2="46" stroke="#231F20" stroke-width="1.5"/>
  <line x1="92" y1="30" x2="92" y2="50" stroke="#231F20" stroke-width="3"/>
  <line x1="98" y1="34" x2="98" y2="46" stroke="#231F20" stroke-width="1.5"/>
  <!-- + symbol -->
  <text x="105" y="38" font-family="Arial, sans-serif" font-size="10" fill="#231F20">+</text>
  <!-- Label -->
  <text x="60" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#231F20">Charger</text>
</svg>
