<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- TX lane (top) -->
  <line x1="15" y1="32" x2="95" y2="32" stroke="#0067B9" stroke-width="2"/>
  <polygon points="90,28 98,32 90,36" fill="#0067B9"/>
  <text x="55" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#58595B">TX</text>
  <!-- RX lane (bottom) -->
  <line x1="25" y1="48" x2="105" y2="48" stroke="#0067B9" stroke-width="2"/>
  <polygon points="30,44 22,48 30,52" fill="#0067B9"/>
  <text x="65" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#58595B">RX</text>
  <!-- SerDes symbol — differential pairs -->
  <text x="14" y="62" font-family="Arial, sans-serif" font-size="7" fill="#58595B">+</text>
  <text x="14" y="70" font-family="Arial, sans-serif" font-size="7" fill="#58595B">−</text>
  <line x1="22" y1="60" x2="40" y2="60" stroke="#231F20" stroke-width="1"/>
  <line x1="22" y1="67" x2="40" y2="67" stroke="#231F20" stroke-width="1"/>
  <text x="100" y="62" font-family="Arial, sans-serif" font-size="7" fill="#58595B">+</text>
  <text x="100" y="70" font-family="Arial, sans-serif" font-size="7" fill="#58595B">−</text>
  <line x1="80" y1="60" x2="98" y2="60" stroke="#231F20" stroke-width="1"/>
  <line x1="80" y1="67" x2="98" y2="67" stroke="#231F20" stroke-width="1"/>
  <!-- Label -->
  <text x="60" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#231F20">Aurora</text>
</svg>
