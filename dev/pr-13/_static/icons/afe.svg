<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80">
  <rect x="2" y="2" width="136" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Multiple analog inputs -->
  <line x1="10" y1="24" x2="28" y2="24" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="10" y1="40" x2="28" y2="40" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="10" y1="56" x2="28" y2="56" stroke="#0067B9" stroke-width="1.5"/>
  <!-- MUX trapezoid -->
  <polygon points="30,16 30,64 46,24 46,56" fill="none" stroke="#231F20" stroke-width="1"/>
  <!-- Amp triangle -->
  <polygon points="50,28 50,52 66,40" fill="none" stroke="#231F20" stroke-width="1" stroke-linejoin="round"/>
  <!-- Filter -->
  <rect x="70" y="32" width="16" height="16" rx="1" fill="none" stroke="#231F20" stroke-width="1"/>
  <path d="M 73 44 L 77 44 L 77 36 L 83 36" fill="none" stroke="#0067B9" stroke-width="1"/>
  <!-- ADC -->
  <polygon points="90,30 90,50 110,40" fill="none" stroke="#231F20" stroke-width="1" stroke-linejoin="round"/>
  <text x="96" y="43" font-family="Arial, sans-serif" font-size="7" fill="#231F20">ADC</text>
  <!-- Digital output -->
  <line x1="110" y1="40" x2="132" y2="40" stroke="#0067B9" stroke-width="1.5"/>
  <polygon points="127,37 132,40 127,43" fill="#0067B9"/>
  <!-- Label -->
  <text x="70" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#231F20">AFE</text>
</svg>
