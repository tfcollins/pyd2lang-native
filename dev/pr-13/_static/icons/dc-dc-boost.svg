  <!-- GND -->
  <line x1="60" y1="56" x2="60" y2="68" stroke="#231F20" stroke-width="1.5"/>
  <line x1="53" y1="68" x2="67" y2="68" stroke="#231F20" stroke-width="1.5"/>
