  <text x="14" y="46" font-family="Arial, sans-serif" font-size="9" fill="#58595B">Vin</text>
  <text x="96" y="34" font-family="Arial, sans-serif" font-size="9" fill="#58595B">Vout</text>
  <!-- Label -->
  <text x="60" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#231F20">Boost</text>
  <!-- SW node -->
