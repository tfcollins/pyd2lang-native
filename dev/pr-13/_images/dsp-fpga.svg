<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Grid pattern (chip-like) -->
  <rect x="25" y="30" width="70" height="40" rx="2" fill="none" stroke="#0067B9" stroke-width="1"/>
  <line x1="25" y1="43" x2="95" y2="43" stroke="#0067B9" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="25" y1="56" x2="95" y2="56" stroke="#0067B9" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="48" y1="30" x2="48" y2="70" stroke="#0067B9" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="72" y1="30" x2="72" y2="70" stroke="#0067B9" stroke-width="0.5" stroke-dasharray="2,2"/>
  <!-- Pin indicators -->
  <rect x="30" y="22" width="6" height="8" fill="#231F20"/>
  <rect x="45" y="22" width="6" height="8" fill="#231F20"/>
  <rect x="60" y="22" width="6" height="8" fill="#231F20"/>
