<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Power path -->
  <line x1="12" y1="34" x2="108" y2="34" stroke="#C8102E" stroke-width="2"/>
  <!-- Shunt resistor inline -->
  <rect x="45" y="30" width="30" height="8" rx="1" fill="none" stroke="#231F20" stroke-width="1.5"/>
  <!-- Sense lines down to measurement -->
  <line x1="50" y1="38" x2="50" y2="52" stroke="#0067B9" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="70" y1="38" x2="70" y2="52" stroke="#0067B9" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Measurement block -->
  <rect x="42" y="52" width="36" height="16" rx="2" fill="none" stroke="#0067B9" stroke-width="1.5"/>
  <text x="60" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#0067B9">V, I, P</text>
  <!-- Label -->
  <text x="60" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#231F20">Power Mon</text>
</svg>
