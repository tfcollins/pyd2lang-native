<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80">
  <rect x="2" y="2" width="136" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- TX path -->
  <text x="14" y="26" font-family="Arial, sans-serif" font-size="8" fill="#58595B">TX</text>
  <line x1="28" y1="24" x2="48" y2="24" stroke="#C8102E" stroke-width="1.5"/>
  <polygon points="44,21 50,24 44,27" fill="#C8102E"/>
  <!-- DAC block -->
  <rect x="50" y="18" width="20" height="12" rx="1" fill="none" stroke="#231F20" stroke-width="1"/>
  <text x="60" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#231F20">DAC</text>
  <line x1="70" y1="24" x2="90" y2="24" stroke="#0067B9" stroke-width="1.5"/>
  <polygon points="86,21 92,24 86,27" fill="#0067B9"/>
  <!-- RF port -->
  <line x1="92" y1="24" x2="128" y2="24" stroke="#0067B9" stroke-width="1.5"/>
  <text x="118" y="20" font-family="Arial, sans-serif" font-size="8" fill="#58595B">RF</text>
  <!-- RX path -->
  <text x="14" y="58" font-family="Arial, sans-serif" font-size="8" fill="#58595B">RX</text>
  <line x1="90" y1="56" x2="70" y2="56" stroke="#0067B9" stroke-width="1.5"/>
  <polygon points="74,53 68,56 74,59" fill="#0067B9"/>
  <!-- ADC block -->
  <rect x="50" y="50" width="20" height="12" rx="1" fill="none" stroke="#231F20" stroke-width="1"/>
  <text x="60" y="59" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#231F20">ADC</text>
  <line x1="50" y1="56" x2="28" y2="56" stroke="#0067B9" stroke-width="1.5"/>
  <polygon points="32,53 26,56 32,59" fill="#0067B9"/>
  <!-- RF port RX -->
  <line x1="92" y1="56" x2="128" y2="56" stroke="#0067B9" stroke-width="1.5"/>
  <!-- JESD label -->
  <text x="18" y="42" font-family="Arial, sans-serif" font-size="7" fill="#0067B9">JESD</text>
  <!-- Label -->
  <text x="70" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#231F20">MxFE</text>
</svg>
