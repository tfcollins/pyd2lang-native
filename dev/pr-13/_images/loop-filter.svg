<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Input -->
  <line x1="12" y1="40" x2="30" y2="40" stroke="#0067B9" stroke-width="1.5"/>
  <!-- R1 resistor -->
  <path d="M 30 40 L 33 34 L 39 46 L 45 34 L 51 46 L 54 40" fill="none" stroke="#231F20" stroke-width="1.5"/>
  <!-- C1 capacitor (series) -->
  <line x1="54" y1="40" x2="60" y2="40" stroke="#231F20" stroke-width="1.5"/>
  <line x1="60" y1="32" x2="60" y2="48" stroke="#231F20" stroke-width="2"/>
  <line x1="64" y1="32" x2="64" y2="48" stroke="#231F20" stroke-width="2"/>
  <line x1="64" y1="40" x2="72" y2="40" stroke="#231F20" stroke-width="1.5"/>
  <!-- Junction to C2 -->
  <circle cx="72" cy="40" r="2" fill="#231F20"/>
  <!-- C2 capacitor (shunt to ground) -->
  <line x1="72" y1="40" x2="72" y2="52" stroke="#231F20" stroke-width="1.5"/>
  <line x1="66" y1="52" x2="78" y2="52" stroke="#231F20" stroke-width="2"/>
  <line x1="66" y1="56" x2="78" y2="56" stroke="#231F20" stroke-width="2"/>
  <!-- Ground -->
  <line x1="72" y1="56" x2="72" y2="62" stroke="#231F20" stroke-width="1.5"/>
  <line x1="66" y1="62" x2="78" y2="62" stroke="#231F20" stroke-width="1.5"/>
  <line x1="68" y1="65" x2="76" y2="65" stroke="#231F20" stroke-width="1"/>
  <line x1="70" y1="68" x2="74" y2="68" stroke="#231F20" stroke-width="0.5"/>
  <!-- Output -->
  <line x1="72" y1="40" x2="108" y2="40" stroke="#0067B9" stroke-width="1.5"/>
  <polygon points="103,37 108,40 103,43" fill="#0067B9"/>
  <!-- Label -->
  <text x="60" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#231F20">Loop Filter</text>
</svg>
