<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Digital side (left) - MII bus -->
  <line x1="12" y1="30" x2="38" y2="30" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="12" y1="40" x2="38" y2="40" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="12" y1="50" x2="38" y2="50" stroke="#0067B9" stroke-width="1.5"/>
  <text x="16" y="64" font-family="Arial, sans-serif" font-size="8" fill="#58595B">MII</text>
  <!-- PHY block -->
  <rect x="38" y="22" width="44" height="36" rx="2" fill="none" stroke="#231F20" stroke-width="1.5"/>
  <text x="60" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#231F20">PHY</text>
  <!-- RJ45 / MDI (right) -->
  <rect x="88" y="28" width="22" height="24" rx="2" fill="none" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="92" y1="34" x2="106" y2="34" stroke="#0067B9" stroke-width="1"/>
  <line x1="92" y1="40" x2="106" y2="40" stroke="#0067B9" stroke-width="1"/>
  <line x1="92" y1="46" x2="106" y2="46" stroke="#0067B9" stroke-width="1"/>
  <!-- Label -->
  <text x="60" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#231F20">Ethernet</text>
</svg>
