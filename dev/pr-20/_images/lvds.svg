<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Single-ended input (left) -->
  <line x1="12" y1="40" x2="35" y2="40" stroke="#0067B9" stroke-width="1.5"/>
  <polygon points="32,37 37,40 32,43" fill="#0067B9"/>
  <!-- Driver triangle -->
  <polygon points="38,28 38,52 62,40" fill="none" stroke="#231F20" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Differential pair output -->
  <line x1="62" y1="36" x2="108" y2="36" stroke="#0067B9" stroke-width="2"/>
  <text x="82" y="32" font-family="Arial, sans-serif" font-size="8" fill="#58595B">D+</text>
  <line x1="62" y1="44" x2="108" y2="44" stroke="#0067B9" stroke-width="2"/>
  <text x="82" y="54" font-family="Arial, sans-serif" font-size="8" fill="#58595B">D−</text>
  <!-- Label -->
  <text x="60" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#231F20">LVDS</text>
</svg>
