<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Logic side (left) -->
  <line x1="12" y1="30" x2="38" y2="30" stroke="#0067B9" stroke-width="1.5"/>
  <text x="16" y="26" font-family="Arial, sans-serif" font-size="8" fill="#58595B">TXD</text>
  <line x1="12" y1="50" x2="38" y2="50" stroke="#0067B9" stroke-width="1.5"/>
  <text x="16" y="46" font-family="Arial, sans-serif" font-size="8" fill="#58595B">RXD</text>
  <!-- Transceiver block -->
  <rect x="38" y="22" width="44" height="36" rx="2" fill="none" stroke="#231F20" stroke-width="1.5"/>
  <!-- CAN bus differential pair -->
  <line x1="82" y1="34" x2="108" y2="34" stroke="#007A33" stroke-width="2"/>
  <text x="88" y="30" font-family="Arial, sans-serif" font-size="8" fill="#58595B">CANH</text>
  <line x1="82" y1="46" x2="108" y2="46" stroke="#007A33" stroke-width="2"/>
  <text x="88" y="56" font-family="Arial, sans-serif" font-size="8" fill="#58595B">CANL</text>
  <!-- Label -->
  <text x="60" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#231F20">CAN</text>
</svg>
