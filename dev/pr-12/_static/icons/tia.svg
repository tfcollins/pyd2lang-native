<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <!-- Amplifier triangle -->
  <polygon points="28,14 28,66 88,40" fill="#FFFFFF" stroke="#231F20" stroke-width="2" stroke-linejoin="round"/>
  <!-- Photodiode input -->
  <line x1="4" y1="30" x2="28" y2="30" stroke="#0067B9" stroke-width="1.5"/>
  <!-- Photodiode symbol -->
  <polygon points="10,24 10,36 18,30" fill="none" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="18" y1="24" x2="18" y2="36" stroke="#0067B9" stroke-width="1.5"/>
  <!-- Light arrows -->
  <line x1="6" y1="18" x2="12" y2="24" stroke="#0067B9" stroke-width="1"/>
  <polygon points="10,20 14,24 10,24" fill="#0067B9"/>
  <line x1="12" y1="18" x2="18" y2="24" stroke="#0067B9" stroke-width="1"/>
  <!-- Feedback resistor (Rf) -->
  <line x1="38" y1="20" x2="38" y2="18" stroke="#231F20" stroke-width="1"/>
  <line x1="38" y1="18" x2="46" y2="18" stroke="#231F20" stroke-width="1"/>
  <rect x="46" y="15" width="20" height="6" rx="1" fill="none" stroke="#231F20" stroke-width="1.5"/>
  <line x1="66" y1="18" x2="78" y2="18" stroke="#231F20" stroke-width="1"/>
  <line x1="78" y1="18" x2="78" y2="40" stroke="#231F20" stroke-width="1"/>
  <text x="56" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#58595B">Rf</text>
  <!-- + - labels -->
  <text x="30" y="54" font-family="Arial, sans-serif" font-size="10" fill="#231F20">+</text>
  <!-- Label -->
  <text x="50" y="44" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#231F20">TIA</text>
</svg>
