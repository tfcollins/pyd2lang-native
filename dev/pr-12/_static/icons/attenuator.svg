<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Resistor pad symbol (pi-attenuator) -->
  <line x1="15" y1="40" x2="30" y2="40" stroke="#231F20" stroke-width="1.5"/>
  <!-- Series resistor (zigzag) -->
  <path d="M 30 40 L 35 30 L 42 50 L 49 30 L 56 50 L 63 30 L 70 50 L 75 40" fill="none" stroke="#231F20" stroke-width="1.5"/>
  <line x1="75" y1="40" x2="105" y2="40" stroke="#231F20" stroke-width="1.5"/>
  <!-- Shunt resistors -->
  <line x1="35" y1="40" x2="35" y2="60" stroke="#231F20" stroke-width="1"/>
  <line x1="70" y1="40" x2="70" y2="60" stroke="#231F20" stroke-width="1"/>
  <!-- Ground lines -->
  <line x1="30" y1="60" x2="40" y2="60" stroke="#231F20" stroke-width="1"/>
  <line x1="65" y1="60" x2="75" y2="60" stroke="#231F20" stroke-width="1"/>
  <!-- Label -->
  <text x="60" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#231F20">ATTEN</text>
</svg>
