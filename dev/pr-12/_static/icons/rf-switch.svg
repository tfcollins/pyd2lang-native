  <text x="98" y="20" font-family="Arial, sans-serif" font-size="8" fill="#58595B">RF1</text>
  <!-- Throw 2 (bottom) - open -->
  <circle cx="74" cy="56" r="3" fill="#231F20"/>
  <line x1="77" y1="56" x2="108" y2="56" stroke="#0067B9" stroke-width="2"/>
  <text x="98" y="52" font-family="Arial, sans-serif" font-size="8" fill="#58595B">RF2</text>
  <!-- Label -->
