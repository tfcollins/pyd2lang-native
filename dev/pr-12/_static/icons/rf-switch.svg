<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Common port (left) -->
  <line x1="12" y1="40" x2="40" y2="40" stroke="#0067B9" stroke-width="2"/>
  <circle cx="42" cy="40" r="3" fill="#231F20"/>
  <!-- Throw 1 (top) - connected -->
  <line x1="42" y1="40" x2="72" y2="24" stroke="#0067B9" stroke-width="2"/>
  <circle cx="74" cy="24" r="3" fill="#231F20"/>
