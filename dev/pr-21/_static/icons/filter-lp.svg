<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Frequency response: flat then roll-off -->
  <line x1="20" y1="65" x2="20" y2="20" stroke="#231F20" stroke-width="1"/>
  <line x1="20" y1="65" x2="100" y2="65" stroke="#231F20" stroke-width="1"/>
