<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Logic input (left) -->
  <line x1="12" y1="40" x2="32" y2="40" stroke="#0067B9" stroke-width="1.5"/>
  <text x="16" y="36" font-family="Arial, sans-serif" font-size="8" fill="#58595B">IN</text>
  <!-- Driver block -->
  <polygon points="34,24 34,56 62,40" fill="none" stroke="#231F20" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Isolation barrier (dashed) -->
  <line x1="66" y1="16" x2="66" y2="64" stroke="#231F20" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- High-current output -->
  <line x1="70" y1="40" x2="90" y2="40" stroke="#C8102E" stroke-width="2.5"/>
  <polygon points="86,36 92,40 86,44" fill="#C8102E"/>
  <!-- MOSFET gate symbol -->
  <line x1="94" y1="28" x2="94" y2="52" stroke="#231F20" stroke-width="2"/>
  <line x1="98" y1="30" x2="98" y2="50" stroke="#231F20" stroke-width="1"/>
  <line x1="98" y1="40" x2="108" y2="40" stroke="#231F20" stroke-width="1.5"/>
  <!-- Label -->
  <text x="60" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#231F20">Gate Driver</text>
</svg>
