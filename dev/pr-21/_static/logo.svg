<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <!-- Background pill -->
  <rect x="0" y="0" width="320" height="80" rx="12" fill="#0067B9"/>

  <!-- D2 text -->
  <text x="20" y="55" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF" letter-spacing="-1">d2</text>

  <!-- Divider -->
  <line x1="78" y1="16" x2="78" y2="64" stroke="#4D9AD5" stroke-width="2"/>

  <!-- Python snake icon (simplified) -->
  <g transform="translate(90, 14)">
    <!-- Snake body -->
    <path d="M 8 26 C 8 12, 20 12, 20 20 L 20 32 C 20 40, 32 40, 32 32 L 32 20 C 32 6, 20 6, 8 6 L 20 6" fill="none" stroke="#FFD43B" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 32 26 C 32 40, 20 40, 20 32 L 20 20 C 20 12, 8 12, 8 20 L 8 32 C 8 46, 20 46, 32 46 L 20 46" fill="none" stroke="#4584B6" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="15" cy="12" r="2" fill="#FFD43B"/>
    <circle cx="25" cy="40" r="2" fill="#4584B6"/>
  </g>

  <!-- Project name -->
  <text x="138" y="38" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">pyd2lang</text>
  <text x="138" y="58" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#A8D4F0">native</text>

  <!-- Signal chain mini diagram -->
  <g transform="translate(252, 22)">
    <!-- Amplifier triangle -->
    <polygon points="0,8 0,28 16,18" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Arrow -->
    <line x1="18" y1="18" x2="28" y2="18" stroke="#A8D4F0" stroke-width="1.5"/>
    <!-- ADC pentagon -->
    <polygon points="30,10 30,26 44,26 50,18 44,10" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <!-- ADI badge -->
  <rect x="252" y="46" width="56" height="18" rx="4" fill="#004A87"/>
  <text x="280" y="59" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">ADI</text>
</svg>
