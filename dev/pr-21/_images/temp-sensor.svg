<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <rect x="2" y="2" width="96" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Thermometer -->
  <rect x="40" y="14" width="10" height="38" rx="5" fill="none" stroke="#231F20" stroke-width="1.5"/>
  <circle cx="45" cy="58" r="10" fill="none" stroke="#231F20" stroke-width="1.5"/>
  <!-- Mercury -->
  <rect x="42" y="26" width="6" height="26" rx="3" fill="#C8102E"/>
  <circle cx="45" cy="58" r="7" fill="#C8102E"/>
  <!-- Temperature scale marks -->
  <line x1="52" y1="20" x2="58" y2="20" stroke="#231F20" stroke-width="1"/>
  <line x1="52" y1="28" x2="56" y2="28" stroke="#231F20" stroke-width="0.5"/>
  <line x1="52" y1="36" x2="58" y2="36" stroke="#231F20" stroke-width="1"/>
  <line x1="52" y1="44" x2="56" y2="44" stroke="#231F20" stroke-width="0.5"/>
  <!-- Digital output -->
  <text x="70" y="44" font-family="Arial, sans-serif" font-size="8" fill="#0067B9">°C</text>
  <!-- Label -->
  <text x="50" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#231F20">Temp</text>
</svg>
