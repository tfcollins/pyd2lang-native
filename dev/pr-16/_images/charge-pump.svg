<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- VDD rail -->
  <line x1="60" y1="18" x2="60" y2="26" stroke="#231F20" stroke-width="1.5"/>
  <line x1="52" y1="18" x2="68" y2="18" stroke="#231F20" stroke-width="2"/>
  <!-- Upper current source (UP) -->
  <circle cx="60" cy="32" r="6" fill="none" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="57" y1="32" x2="63" y2="32" stroke="#0067B9" stroke-width="1.5"/>
  <polygon points="58,29 60,26 62,29" fill="#0067B9"/>
  <!-- Output node -->
  <line x1="60" y1="38" x2="60" y2="44" stroke="#231F20" stroke-width="1.5"/>
  <circle cx="60" cy="44" r="2" fill="#231F20"/>
  <line x1="62" y1="44" x2="105" y2="44" stroke="#0067B9" stroke-width="1.5"/>
  <polygon points="100,41 105,44 100,47" fill="#0067B9"/>
  <text x="90" y="40" font-family="Arial, sans-serif" font-size="8" fill="#58595B">OUT</text>
  <!-- Lower current source (DN) -->
  <line x1="60" y1="44" x2="60" y2="50" stroke="#231F20" stroke-width="1.5"/>
  <circle cx="60" cy="56" r="6" fill="none" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="57" y1="56" x2="63" y2="56" stroke="#0067B9" stroke-width="1.5"/>
  <polygon points="58,59 60,62 62,59" fill="#0067B9"/>
  <!-- GND rail -->
  <line x1="60" y1="62" x2="60" y2="70" stroke="#231F20" stroke-width="1.5"/>
  <line x1="52" y1="70" x2="68" y2="70" stroke="#231F20" stroke-width="1.5"/>
  <line x1="55" y1="73" x2="65" y2="73" stroke="#231F20" stroke-width="1"/>
  <line x1="57" y1="76" x2="63" y2="76" stroke="#231F20" stroke-width="0.5"/>
  <!-- UP/DN inputs -->
  <line x1="12" y1="32" x2="54" y2="32" stroke="#0067B9" stroke-width="1"/>
  <text x="18" y="28" font-family="Arial, sans-serif" font-size="8" fill="#58595B">UP</text>
  <line x1="12" y1="56" x2="54" y2="56" stroke="#0067B9" stroke-width="1"/>
  <text x="18" y="52" font-family="Arial, sans-serif" font-size="8" fill="#58595B">DN</text>
  <!-- Label -->
  <text x="60" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#231F20">Charge Pump</text>
