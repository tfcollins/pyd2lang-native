<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Power path -->
  <line x1="12" y1="40" x2="42" y2="40" stroke="#C8102E" stroke-width="2"/>
  <line x1="78" y1="40" x2="108" y2="40" stroke="#C8102E" stroke-width="2"/>
  <!-- MOSFET symbol -->
  <line x1="60" y1="28" x2="60" y2="52" stroke="#231F20" stroke-width="1.5"/>
  <line x1="52" y1="32" x2="52" y2="48" stroke="#231F20" stroke-width="2"/>
  <line x1="42" y1="40" x2="52" y2="40" stroke="#231F20" stroke-width="1.5"/>
  <line x1="52" y1="34" x2="60" y2="34" stroke="#231F20" stroke-width="1"/>
  <line x1="52" y1="40" x2="60" y2="40" stroke="#231F20" stroke-width="1"/>
  <line x1="52" y1="46" x2="60" y2="46" stroke="#231F20" stroke-width="1"/>
  <line x1="60" y1="28" x2="78" y2="28" stroke="#231F20" stroke-width="1.5"/>
  <line x1="78" y1="28" x2="78" y2="40" stroke="#231F20" stroke-width="1.5"/>
  <!-- Gate control -->
  <line x1="46" y1="40" x2="46" y2="62" stroke="#0067B9" stroke-width="1"/>
  <rect x="36" y="62" width="20" height="10" rx="1" fill="none" stroke="#0067B9" stroke-width="1"/>
  <text x="46" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#0067B9">CTRL</text>
  <!-- Lightning bolt -->
  <polygon points="88,18 84,32 90,30 86,44 92,26 86,28" fill="#C8102E" stroke="none"/>
  <!-- Label -->
  <text x="60" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#231F20">Hot Swap</text>
</svg>
