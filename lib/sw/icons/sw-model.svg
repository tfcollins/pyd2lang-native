<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80">
  <rect x="2" y="2" width="136" height="76" rx="8" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Neural network: 2-3-2 pattern -->
  <!-- Lines connecting layer 1 to layer 2 -->
  <line x1="40" y1="28" x2="70" y2="18" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="40" y1="28" x2="70" y2="40" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="40" y1="28" x2="70" y2="62" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="40" y1="52" x2="70" y2="18" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="40" y1="52" x2="70" y2="40" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="40" y1="52" x2="70" y2="62" stroke="#0067B9" stroke-width="1.5"/>
  <!-- Lines connecting layer 2 to layer 3 -->
  <line x1="70" y1="18" x2="100" y2="28" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="70" y1="18" x2="100" y2="52" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="70" y1="40" x2="100" y2="28" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="70" y1="40" x2="100" y2="52" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="70" y1="62" x2="100" y2="28" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="70" y1="62" x2="100" y2="52" stroke="#0067B9" stroke-width="1.5"/>
  <!-- Layer 1: 2 nodes -->
  <circle cx="40" cy="28" r="5" fill="#0067B9" stroke="#231F20" stroke-width="1.5"/>
  <circle cx="40" cy="52" r="5" fill="#0067B9" stroke="#231F20" stroke-width="1.5"/>
  <!-- Layer 2: 3 nodes -->
  <circle cx="70" cy="18" r="5" fill="#0067B9" stroke="#231F20" stroke-width="1.5"/>
  <circle cx="70" cy="40" r="5" fill="#0067B9" stroke="#231F20" stroke-width="1.5"/>
  <circle cx="70" cy="62" r="5" fill="#0067B9" stroke="#231F20" stroke-width="1.5"/>
  <!-- Layer 3: 2 nodes -->
  <circle cx="100" cy="28" r="5" fill="#0067B9" stroke="#231F20" stroke-width="1.5"/>
  <circle cx="100" cy="52" r="5" fill="#0067B9" stroke="#231F20" stroke-width="1.5"/>
</svg>
