<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80">
  <rect x="2" y="2" width="136" height="76" rx="8" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Terminal window -->
  <rect x="20" y="14" width="100" height="52" rx="4" fill="#231F20" stroke="#231F20" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="20" y="14" width="100" height="12" rx="4" fill="#444444"/>
  <rect x="20" y="22" width="100" height="4" fill="#444444"/>
  <!-- Dots -->
  <circle cx="30" cy="20" r="2" fill="#FF5F56"/>
  <circle cx="37" cy="20" r="2" fill="#FFBD2E"/>
  <circle cx="44" cy="20" r="2" fill="#27CA40"/>
  <!-- > prompt -->
  <polyline points="32,38 42,44 32,50" fill="none" stroke="#0067B9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- _ cursor -->
  <line x1="48" y1="50" x2="60" y2="50" stroke="#0067B9" stroke-width="2.5" stroke-linecap="round"/>
</svg>
