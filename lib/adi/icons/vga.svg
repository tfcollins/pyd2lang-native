<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <!-- Amplifier triangle -->
  <polygon points="10,14 10,66 88,40" fill="#FFFFFF" stroke="#231F20" stroke-width="2" stroke-linejoin="round"/>
  <!-- Variable gain arrow (diagonal across triangle) -->
  <line x1="26" y1="54" x2="56" y2="28" stroke="#0067B9" stroke-width="2"/>
  <polygon points="52,24 58,26 54,32" fill="#0067B9"/>
  <!-- Gain control input -->
  <line x1="36" y1="66" x2="36" y2="56" stroke="#0067B9" stroke-width="1"/>
  <text x="36" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#58595B">GAIN</text>
  <!-- Label -->
  <text x="36" y="38" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#231F20">VGA</text>
</svg>
