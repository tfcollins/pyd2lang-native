<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Two-wire bus -->
  <line x1="15" y1="38" x2="105" y2="38" stroke="#0067B9" stroke-width="2"/>
  <text x="60" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#58595B">SCL</text>
  <line x1="15" y1="54" x2="105" y2="54" stroke="#0067B9" stroke-width="2"/>
  <text x="60" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#58595B">SDA</text>
  <!-- Pull-up resistors -->
  <line x1="35" y1="25" x2="35" y2="38" stroke="#231F20" stroke-width="1"/>
  <rect x="32" y="25" width="6" height="3" fill="#231F20"/>
  <line x1="85" y1="25" x2="85" y2="38" stroke="#231F20" stroke-width="1"/>
  <rect x="82" y="25" width="6" height="3" fill="#231F20"/>
  <!-- Bidirectional arrows on SDA -->
  <polygon points="20,51 15,54 20,57" fill="#0067B9"/>
  <polygon points="100,51 105,54 100,57" fill="#0067B9"/>
  <!-- Label -->
  <text x="60" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#231F20">I²C</text>
  <!-- Device taps -->
  <circle cx="55" cy="38" r="2" fill="#0067B9"/>
  <circle cx="55" cy="54" r="2" fill="#0067B9"/>
  <line x1="55" y1="38" x2="55" y2="54" stroke="#0067B9" stroke-width="1" stroke-dasharray="2,2"/>
</svg>
