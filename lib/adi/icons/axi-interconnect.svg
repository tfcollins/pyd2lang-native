<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect x="2" y="2" width="116" height="76" rx="4" fill="#FFFFFF" stroke="#231F20" stroke-width="2"/>
  <!-- Crossbar pattern -->
  <line x1="20" y1="35" x2="100" y2="35" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="20" y1="50" x2="100" y2="50" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="40" y1="28" x2="40" y2="57" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="60" y1="28" x2="60" y2="57" stroke="#0067B9" stroke-width="1.5"/>
  <line x1="80" y1="28" x2="80" y2="57" stroke="#0067B9" stroke-width="1.5"/>
  <!-- Junction dots -->
  <circle cx="40" cy="35" r="2.5" fill="#0067B9"/>
  <circle cx="60" cy="35" r="2.5" fill="#0067B9"/>
  <circle cx="80" cy="35" r="2.5" fill="#0067B9"/>
